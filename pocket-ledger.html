<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pocket Ledger</title>
  <style>
    :root {
      --ink: #202329;
      --muted: #657080;
      --line: #d7dde6;
      --paper: #f4f7f3;
      --panel: #ffffff;
      --green: #167453;
      --blue: #2c62c9;
      --red: #bd3d3b;
      --violet: #7550b8;
      --gold: #9c6816;
      --shadow: 0 18px 46px rgba(31, 38, 48, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(120deg, rgba(22, 116, 83, .12), transparent 34%),
        linear-gradient(250deg, rgba(117, 80, 184, .11), transparent 35%),
        var(--paper);
    }

    button, input, select { font: inherit; }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover { border-color: #aab4c1; }
    button.primary { background: var(--green); border-color: var(--green); color: #fff; }
    button.icon { width: 38px; padding: 0; display: inline-grid; place-items: center; }

    .app {
      width: min(1220px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }

    header {
      display: flex;
      align-items: end;
      justify-content: space-between;
      gap: 18px;
      padding: 12px 0 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.2rem, 6vw, 4.8rem);
      line-height: .94;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 10px;
      color: var(--muted);
      line-height: 1.5;
      max-width: 660px;
    }

    .actions, .toolbar {
      display: flex;
      justify-content: flex-end;
      flex-wrap: wrap;
      gap: 10px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 380px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 255, 255, .84);
      border: 1px solid rgba(215, 221, 230, .92);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 16px;
    }

    .stat, .analysis-card {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 12px;
    }

    .stat span, .analysis-card span {
      display: block;
      color: var(--muted);
      font-size: .78rem;
      margin-bottom: 7px;
    }

    .stat b, .analysis-card b {
      font-size: 1.35rem;
      line-height: 1;
      font-variant-numeric: tabular-nums;
      overflow-wrap: anywhere;
    }

    .income { color: var(--green); }
    .expense { color: var(--red); }
    .balance { color: var(--blue); }
    .saving { color: var(--violet); }

    .form {
      display: grid;
      grid-template-columns: 1fr 120px 130px 120px 150px auto;
      gap: 10px;
      align-items: end;
      margin-bottom: 14px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: .82rem;
    }

    input, select {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      outline: none;
    }

    input:focus, select:focus {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(22, 116, 83, .13);
    }

    .filters {
      display: grid;
      grid-template-columns: 170px 150px;
      gap: 10px;
      align-items: end;
    }

    .entries, .side, .categories, .timeline, .months {
      display: grid;
      gap: 9px;
    }

    .entry {
      display: grid;
      grid-template-columns: 1fr auto 38px;
      gap: 10px;
      align-items: center;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .entry-main strong {
      display: block;
      overflow-wrap: anywhere;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 5px;
      color: var(--muted);
      font-size: .8rem;
    }

    .pill {
      border: 1px solid var(--line);
      background: #f9fbfd;
      border-radius: 999px;
      padding: 2px 8px;
    }

    .amount {
      font-weight: 800;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .budget {
      display: grid;
      gap: 10px;
    }

    .budget-row {
      display: grid;
      grid-template-columns: 1fr 112px;
      gap: 10px;
      align-items: end;
    }

    .bar-shell {
      height: 11px;
      background: #e5ebf0;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--green), var(--gold), var(--red));
      transition: width .2s ease;
    }

    .category, .day, .month {
      display: grid;
      gap: 7px;
      padding: 11px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .category {
      text-align: left;
      min-height: auto;
      cursor: pointer;
    }

    .category.active {
      border-color: var(--green);
      box-shadow: 0 0 0 3px rgba(22, 116, 83, .12);
    }

    .category-details {
      display: grid;
      gap: 8px;
      margin-top: 12px;
    }

    .detail {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .detail strong {
      display: block;
      overflow-wrap: anywhere;
      margin-bottom: 4px;
    }

    .line {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
    }

    .line strong { overflow-wrap: anywhere; }

    .analysis-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }

    .weekday-bars {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      height: 150px;
      align-items: end;
      padding-top: 8px;
    }

    .weekday {
      display: grid;
      gap: 6px;
      align-items: end;
      justify-items: center;
      color: var(--muted);
      font-size: .74rem;
      min-width: 0;
    }

    .weekday i {
      display: block;
      width: 100%;
      min-height: 4px;
      border-radius: 7px 7px 0 0;
      background: linear-gradient(180deg, var(--violet), var(--blue));
    }

    .mini {
      color: var(--muted);
      font-size: .8rem;
      line-height: 1.45;
    }

    .empty {
      border: 1px dashed #aeb8c6;
      border-radius: 8px;
      padding: 18px;
      color: var(--muted);
      text-align: center;
      background: rgba(255,255,255,.56);
    }

    @media (max-width: 1060px) {
      header {
        align-items: start;
        flex-direction: column;
      }

      .actions { justify-content: start; }
      .layout { grid-template-columns: 1fr; }
    }

    @media (max-width: 820px) {
      .summary, .analysis-grid { grid-template-columns: 1fr 1fr; }
      .form { grid-template-columns: 1fr 1fr; }
      .form label:first-child { grid-column: 1 / -1; }
      .form button { grid-column: 1 / -1; }
      .filters { grid-template-columns: 1fr 1fr; width: 100%; }
    }

    @media (max-width: 560px) {
      .app { width: min(100vw - 20px, 1220px); padding-top: 16px; }
      .panel { padding: 12px; border-radius: 10px; }
      .summary, .analysis-grid, .form, .budget-row, .filters { grid-template-columns: 1fr; }
      .entry { grid-template-columns: 1fr; }
      .entry .icon { justify-self: end; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Pocket Ledger</h1>
        <div class="sub">一个带时间分析的轻量账本。按月份、日期、星期和分类看钱的流向，适合日常复盘，不试图变成复杂财务系统。</div>
      </div>
      <div class="actions">
        <button id="sampleBtn" type="button">示例</button>
        <button id="exportBtn" type="button">导出</button>
        <button id="clearBtn" type="button">清空</button>
      </div>
    </header>

    <section class="layout">
      <div class="panel">
        <div class="summary">
          <div class="stat"><span>收入</span><b class="income" id="incomeTotal">¥0</b></div>
          <div class="stat"><span>支出</span><b class="expense" id="expenseTotal">¥0</b></div>
          <div class="stat"><span>结余</span><b class="balance" id="balanceTotal">¥0</b></div>
          <div class="stat"><span>储蓄率</span><b class="saving" id="savingRate">0%</b></div>
        </div>

        <form class="form" id="entryForm">
          <label>
            名称
            <input id="entryName" maxlength="80" placeholder="午餐、工资、订阅..." required>
          </label>
          <label>
            金额
            <input id="entryAmount" type="number" min="0" step="0.01" placeholder="0.00" required>
          </label>
          <label>
            分类
            <select id="entryCategory">
              <option>餐饮</option>
              <option>交通</option>
              <option>购物</option>
              <option>居住</option>
              <option>娱乐</option>
              <option>学习</option>
              <option>医疗</option>
              <option>收入</option>
              <option>其他</option>
            </select>
          </label>
          <label>
            类型
            <select id="entryType">
              <option value="expense">支出</option>
              <option value="income">收入</option>
            </select>
          </label>
          <label>
            日期
            <input id="entryDate" type="date" required>
          </label>
          <button class="primary" type="submit">添加</button>
        </form>

        <div class="section-title">
          <h2>流水</h2>
          <div class="filters">
            <label>
              月份
              <input id="monthFilter" type="month">
            </label>
            <label>
              类型
              <select id="filterType" aria-label="筛选类型">
                <option value="all">全部</option>
                <option value="expense">支出</option>
                <option value="income">收入</option>
              </select>
            </label>
          </div>
        </div>
        <div class="entries" id="entries"></div>
      </div>

      <aside class="side">
        <div class="panel budget">
          <div class="section-title"><h2>本月预算</h2></div>
          <div class="budget-row">
            <label>
              预算金额
              <input id="budget" type="number" min="0" step="1" placeholder="例如 5000">
            </label>
            <div class="stat"><span>已用</span><b id="budgetRate">0%</b></div>
          </div>
          <div class="bar-shell"><div class="bar" id="budgetBar"></div></div>
          <div class="mini" id="budgetHint">设置预算后，这里会显示当前月份的支出进度。</div>
        </div>

        <div class="panel">
          <div class="section-title"><h2>时间分析</h2></div>
          <div class="analysis-grid">
            <div class="analysis-card"><span>日均支出</span><b id="dailyAverage">¥0</b></div>
            <div class="analysis-card"><span>最高支出日</span><b id="peakDay">-</b></div>
            <div class="analysis-card"><span>交易天数</span><b id="activeDays">0</b></div>
          </div>
          <div class="weekday-bars" id="weekdayBars"></div>
        </div>

        <div class="panel">
          <div class="section-title"><h2>每日支出</h2></div>
          <div class="timeline" id="timeline"></div>
        </div>

        <div class="panel">
          <div class="section-title">
            <h2>分类支出</h2>
            <button id="clearCategory" type="button">全部</button>
          </div>
          <div class="categories" id="categories"></div>
          <div class="category-details" id="categoryDetails"></div>
        </div>

        <div class="panel">
          <div class="section-title"><h2>月份对比</h2></div>
          <div class="months" id="months"></div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const storeKey = "pocket-ledger-v2";
    const oldStoreKey = "pocket-ledger-v1";
    const $ = (id) => document.getElementById(id);
    let state = {
      entries: [],
      budget: "",
      selectedMonth: "",
      selectedCategory: ""
    };

    function uid() {
      return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function money(value) {
      return new Intl.NumberFormat("zh-CN", { style: "currency", currency: "CNY" }).format(value || 0);
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function thisMonth() {
      return today().slice(0, 7);
    }

    function normalizeEntry(entry) {
      return {
        id: entry.id || uid(),
        name: entry.name || "未命名",
        amount: Number(entry.amount || 0),
        category: entry.category || (entry.type === "income" ? "收入" : "其他"),
        type: entry.type || "expense",
        date: entry.date || today()
      };
    }

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(storeKey) || localStorage.getItem(oldStoreKey) || "{}");
        state = { ...state, ...saved };
      } catch {
        localStorage.removeItem(storeKey);
      }
      state.entries = (state.entries || []).map(normalizeEntry);
      if (!state.entries.length) seed();
      state.selectedMonth = state.selectedMonth || latestMonth();
      $("budget").value = state.budget;
      $("monthFilter").value = state.selectedMonth;
      $("entryDate").value = today();
    }

    function save() {
      localStorage.setItem(storeKey, JSON.stringify(state));
    }

    function seed() {
      const month = thisMonth();
      const prior = shiftMonth(month, -1);
      state.entries = [
        { id: uid(), name: "工资", amount: 12000, category: "收入", type: "income", date: `${month}-05` },
        { id: uid(), name: "房租", amount: 3600, category: "居住", type: "expense", date: `${month}-02` },
        { id: uid(), name: "午餐", amount: 38, category: "餐饮", type: "expense", date: `${month}-06` },
        { id: uid(), name: "地铁", amount: 6, category: "交通", type: "expense", date: `${month}-06` },
        { id: uid(), name: "课程订阅", amount: 99, category: "学习", type: "expense", date: `${month}-11` },
        { id: uid(), name: "朋友聚餐", amount: 216, category: "餐饮", type: "expense", date: `${month}-14` },
        { id: uid(), name: "书", amount: 78, category: "学习", type: "expense", date: `${month}-18` },
        { id: uid(), name: "兼职收入", amount: 1600, category: "收入", type: "income", date: `${prior}-24` },
        { id: uid(), name: "运动鞋", amount: 499, category: "购物", type: "expense", date: `${prior}-12` },
        { id: uid(), name: "晚餐", amount: 86, category: "餐饮", type: "expense", date: `${prior}-16` }
      ];
      state.budget = "5000";
      state.selectedMonth = month;
    }

    function shiftMonth(yyyyMm, delta) {
      const [year, month] = yyyyMm.split("-").map(Number);
      const date = new Date(year, month - 1 + delta, 1);
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}`;
    }

    function latestMonth() {
      return state.entries.map((entry) => entry.date.slice(0, 7)).sort().pop() || thisMonth();
    }

    function visibleEntries() {
      const type = $("filterType").value;
      return state.entries
        .filter((entry) => entry.date.slice(0, 7) === state.selectedMonth)
        .filter((entry) => type === "all" || entry.type === type)
        .sort((a, b) => b.date.localeCompare(a.date));
    }

    function monthEntries(month = state.selectedMonth) {
      return state.entries.filter((entry) => entry.date.slice(0, 7) === month);
    }

    function totals(entries = monthEntries()) {
      const income = entries.filter((entry) => entry.type === "income").reduce((sum, entry) => sum + Number(entry.amount), 0);
      const expense = entries.filter((entry) => entry.type === "expense").reduce((sum, entry) => sum + Number(entry.amount), 0);
      return { income, expense, balance: income - expense };
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function renderSummary() {
      const total = totals();
      const savingRate = total.income ? Math.round(total.balance / total.income * 100) : 0;
      $("incomeTotal").textContent = money(total.income);
      $("expenseTotal").textContent = money(total.expense);
      $("balanceTotal").textContent = money(total.balance);
      $("savingRate").textContent = `${savingRate}%`;
    }

    function renderEntries() {
      const rows = visibleEntries();
      $("entries").innerHTML = rows.length ? rows.map((entry) => `
        <article class="entry">
          <div class="entry-main">
            <strong>${escapeHtml(entry.name)}</strong>
            <div class="meta">
              <span class="pill">${escapeHtml(entry.category)}</span>
              <span>${entry.date}</span>
            </div>
          </div>
          <div class="amount ${entry.type}">${entry.type === "income" ? "+" : "-"}${money(Number(entry.amount))}</div>
          <button class="icon" title="删除" aria-label="删除记录" data-remove="${entry.id}">x</button>
        </article>
      `).join("") : `<div class="empty">这个月份还没有记录。</div>`;
    }

    function categoryData() {
      const map = new Map();
      monthEntries().filter((entry) => entry.type === "expense").forEach((entry) => {
        map.set(entry.category, (map.get(entry.category) || 0) + Number(entry.amount));
      });
      return [...map.entries()].sort((a, b) => b[1] - a[1]);
    }

    function renderCategories() {
      const data = categoryData();
      const max = Math.max(...data.map((item) => item[1]), 1);
      $("categories").innerHTML = data.length ? data.map(([name, amount]) => `
        <button class="category ${state.selectedCategory === name ? "active" : ""}" type="button" data-category="${escapeHtml(name)}">
          <div class="line">
            <strong>${escapeHtml(name)}</strong>
            <span class="amount expense">${money(amount)}</span>
          </div>
          <div class="bar-shell"><div class="bar" style="width: ${Math.round(amount / max * 100)}%"></div></div>
        </button>
      `).join("") : `<div class="empty">暂无支出分类。</div>`;
      renderCategoryDetails();
    }

    function categoryEntries() {
      const target = state.selectedCategory || (categoryData()[0] && categoryData()[0][0]) || "";
      return monthEntries()
        .filter((entry) => entry.type === "expense" && entry.category === target)
        .sort((a, b) => b.date.localeCompare(a.date));
    }

    function renderCategoryDetails() {
      const target = state.selectedCategory || (categoryData()[0] && categoryData()[0][0]) || "";
      const rows = categoryEntries();
      const total = rows.reduce((sum, entry) => sum + Number(entry.amount), 0);
      $("categoryDetails").innerHTML = target && rows.length ? `
        <div class="mini">${escapeHtml(target)} 明细，共 ${money(total)}</div>
        ${rows.map((entry) => `
          <div class="detail">
            <div>
              <strong>${escapeHtml(entry.name)}</strong>
              <span class="mini">${entry.date}</span>
            </div>
            <span class="amount expense">${money(entry.amount)}</span>
          </div>
        `).join("")}
      ` : "";
    }

    function dailyExpense() {
      const map = new Map();
      monthEntries().filter((entry) => entry.type === "expense").forEach((entry) => {
        map.set(entry.date, (map.get(entry.date) || 0) + Number(entry.amount));
      });
      return [...map.entries()].sort((a, b) => a[0].localeCompare(b[0]));
    }

    function renderTimeline() {
      const data = dailyExpense();
      const max = Math.max(...data.map((item) => item[1]), 1);
      $("timeline").innerHTML = data.length ? data.map(([date, amount]) => `
        <div class="day">
          <div class="line">
            <strong>${date}</strong>
            <span class="amount expense">${money(amount)}</span>
          </div>
          <div class="bar-shell"><div class="bar" style="width: ${Math.round(amount / max * 100)}%"></div></div>
        </div>
      `).join("") : `<div class="empty">暂无每日支出。</div>`;
    }

    function renderTimeAnalysis() {
      const data = dailyExpense();
      const expense = totals().expense;
      const activeDays = data.length;
      const peak = data.slice().sort((a, b) => b[1] - a[1])[0];
      $("dailyAverage").textContent = money(activeDays ? expense / activeDays : 0);
      $("peakDay").textContent = peak ? peak[0].slice(5) : "-";
      $("activeDays").textContent = activeDays;

      const weekdayNames = ["日", "一", "二", "三", "四", "五", "六"];
      const weekdayTotals = Array(7).fill(0);
      monthEntries().filter((entry) => entry.type === "expense").forEach((entry) => {
        const weekday = new Date(`${entry.date}T00:00:00`).getDay();
        weekdayTotals[weekday] += Number(entry.amount);
      });
      const max = Math.max(...weekdayTotals, 1);
      $("weekdayBars").innerHTML = weekdayTotals.map((amount, index) => `
        <div class="weekday" title="${weekdayNames[index]} ${money(amount)}">
          <i style="height: ${Math.max(4, Math.round(amount / max * 118))}px"></i>
          <span>${weekdayNames[index]}</span>
        </div>
      `).join("");
    }

    function renderBudget() {
      const budget = Number(state.budget || 0);
      const expense = totals().expense;
      const rate = budget ? Math.round(expense / budget * 100) : 0;
      $("budgetRate").textContent = `${rate}%`;
      $("budgetBar").style.width = `${Math.min(rate, 100)}%`;
      $("budgetHint").textContent = budget
        ? `${state.selectedMonth} 已支出 ${money(expense)}，预算剩余 ${money(Math.max(budget - expense, 0))}。`
        : "设置预算后，这里会显示当前月份的支出进度。";
    }

    function renderMonths() {
      const months = [...new Set(state.entries.map((entry) => entry.date.slice(0, 7)))].sort().reverse();
      $("months").innerHTML = months.length ? months.map((month) => {
        const total = totals(monthEntries(month));
        return `
          <div class="month">
            <div class="line">
              <strong>${month}</strong>
              <span class="amount balance">${money(total.balance)}</span>
            </div>
            <div class="mini">收入 ${money(total.income)} / 支出 ${money(total.expense)}</div>
          </div>
        `;
      }).join("") : `<div class="empty">暂无月份数据。</div>`;
    }

    function renderAll() {
      renderSummary();
      renderEntries();
      renderCategories();
      renderTimeline();
      renderTimeAnalysis();
      renderBudget();
      renderMonths();
      save();
    }

    $("entryForm").addEventListener("submit", (event) => {
      event.preventDefault();
      const date = $("entryDate").value || today();
      state.entries.push({
        id: uid(),
        name: $("entryName").value.trim(),
        amount: Number($("entryAmount").value),
        category: $("entryCategory").value,
        type: $("entryType").value,
        date
      });
      state.selectedMonth = date.slice(0, 7);
      $("monthFilter").value = state.selectedMonth;
      $("entryName").value = "";
      $("entryAmount").value = "";
      $("entryDate").value = today();
      renderAll();
    });

    $("entries").addEventListener("click", (event) => {
      const id = event.target.dataset.remove;
      if (!id) return;
      state.entries = state.entries.filter((entry) => entry.id !== id);
      renderAll();
    });

    $("filterType").addEventListener("change", renderEntries);

    $("monthFilter").addEventListener("input", () => {
      state.selectedMonth = $("monthFilter").value || latestMonth();
      state.selectedCategory = "";
      renderAll();
    });

    $("categories").addEventListener("click", (event) => {
      const button = event.target.closest("[data-category]");
      if (!button) return;
      state.selectedCategory = button.dataset.category;
      renderAll();
    });

    $("clearCategory").addEventListener("click", () => {
      state.selectedCategory = "";
      renderAll();
    });

    $("budget").addEventListener("input", () => {
      state.budget = $("budget").value;
      renderAll();
    });

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = document.createElement("textarea");
        scratch.value = text;
        scratch.style.position = "fixed";
        scratch.style.left = "-9999px";
        document.body.appendChild(scratch);
        scratch.focus();
        scratch.select();
        document.execCommand("copy");
        scratch.remove();
      }
    }

    $("exportBtn").addEventListener("click", async () => {
      const total = totals();
      const lines = [
        `Pocket Ledger ${state.selectedMonth}`,
        `收入: ${money(total.income)}`,
        `支出: ${money(total.expense)}`,
        `结余: ${money(total.balance)}`,
        `储蓄率: ${$("savingRate").textContent}`,
        "",
        "分类支出:",
        ...categoryData().map(([name, amount]) => `- ${name}: ${money(amount)}`),
        "",
        "每日支出:",
        ...dailyExpense().map(([date, amount]) => `- ${date}: ${money(amount)}`),
        "",
        "流水:",
        ...visibleEntries().map((entry) => `${entry.date} ${entry.type === "income" ? "收入" : "支出"} ${entry.category} ${entry.name} ${money(entry.amount)}`)
      ];
      await copyText(lines.join("\n"));
      $("exportBtn").textContent = "已复制";
      setTimeout(() => $("exportBtn").textContent = "导出", 1100);
    });

    $("sampleBtn").addEventListener("click", () => {
      seed();
      $("budget").value = state.budget;
      $("monthFilter").value = state.selectedMonth;
      $("entryDate").value = today();
      renderAll();
    });

    $("clearBtn").addEventListener("click", () => {
      state = { entries: [], budget: "", selectedMonth: thisMonth() };
      $("budget").value = "";
      $("monthFilter").value = state.selectedMonth;
      $("entryDate").value = today();
      renderAll();
    });

    load();
    renderAll();
  </script>
</body>
</html>
