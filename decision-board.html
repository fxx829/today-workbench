<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Decision Board</title>
  <style>
    :root {
      --ink: #20242c;
      --muted: #667085;
      --line: #d8dee8;
      --paper: #f6f4ef;
      --panel: #fffdf8;
      --blue: #3157d5;
      --teal: #087d7a;
      --rose: #b43f61;
      --gold: #a56511;
      --shadow: 0 18px 40px rgba(35, 39, 48, .12);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background:
        linear-gradient(115deg, rgba(8, 125, 122, .11), transparent 34%),
        linear-gradient(245deg, rgba(180, 63, 97, .10), transparent 35%),
        var(--paper);
    }

    button, input, textarea {
      font: inherit;
    }

    button {
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      cursor: pointer;
    }

    button:hover { border-color: #a9b3c2; }
    button.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
    button.icon { width: 38px; padding: 0; display: inline-grid; place-items: center; }

    .app {
      width: min(1220px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 24px 0 36px;
    }

    header {
      display: flex;
      justify-content: space-between;
      align-items: end;
      gap: 18px;
      padding: 12px 0 22px;
    }

    h1 {
      margin: 0;
      font-size: clamp(2.1rem, 6vw, 4.8rem);
      line-height: .94;
      letter-spacing: 0;
    }

    .sub {
      margin-top: 10px;
      color: var(--muted);
      max-width: 640px;
      line-height: 1.5;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 18px;
      align-items: start;
    }

    .panel {
      background: rgba(255, 253, 248, .82);
      border: 1px solid rgba(216, 222, 232, .92);
      border-radius: 12px;
      box-shadow: var(--shadow);
      padding: 16px;
      backdrop-filter: blur(10px);
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    h2 {
      margin: 0;
      font-size: 1rem;
      letter-spacing: 0;
    }

    .decision-title {
      display: grid;
      gap: 8px;
      margin-bottom: 16px;
    }

    label {
      display: grid;
      gap: 6px;
      color: var(--muted);
      font-size: .82rem;
    }

    input, textarea {
      width: 100%;
      min-height: 38px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
      outline: none;
    }

    textarea {
      min-height: 96px;
      resize: vertical;
      line-height: 1.45;
    }

    input:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(49, 87, 213, .13);
    }

    .rows {
      display: grid;
      gap: 10px;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(120px, 1fr) 86px 38px;
      gap: 10px;
      align-items: end;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .option-row {
      grid-template-columns: minmax(140px, 1fr) repeat(var(--criteria-count), minmax(74px, 92px)) 86px 38px;
      overflow-x: auto;
    }

    .score-box {
      display: grid;
      gap: 6px;
    }

    .score-box span {
      color: var(--muted);
      font-size: .76rem;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 92px;
    }

    input[type="number"] {
      text-align: center;
    }

    .total {
      display: grid;
      align-content: center;
      justify-items: center;
      min-height: 38px;
      border-radius: 8px;
      background: #f1f4fb;
      color: var(--blue);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .rankings {
      display: grid;
      gap: 10px;
    }

    .rank {
      display: grid;
      gap: 8px;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
    }

    .rank-head {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      align-items: baseline;
    }

    .rank strong {
      overflow-wrap: anywhere;
    }

    .score {
      color: var(--blue);
      font-weight: 800;
      font-variant-numeric: tabular-nums;
    }

    .meter {
      height: 9px;
      border-radius: 999px;
      overflow: hidden;
      background: #e7ebf3;
    }

    .meter span {
      display: block;
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--teal), var(--blue), var(--rose));
    }

    .empty {
      border: 1px dashed #abb5c4;
      border-radius: 8px;
      padding: 18px;
      text-align: center;
      color: var(--muted);
      background: rgba(255,255,255,.56);
    }

    .note {
      margin-top: 14px;
    }

    .mini {
      color: var(--muted);
      font-size: .8rem;
      line-height: 1.45;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      border-radius: 999px;
      border: 1px solid var(--line);
      padding: 0 8px;
      color: var(--gold);
      background: #fff8ea;
      font-size: .78rem;
    }

    @media (max-width: 980px) {
      header {
        align-items: start;
        flex-direction: column;
      }

      .actions { justify-content: start; }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 620px) {
      .app { width: min(100vw - 20px, 1220px); padding-top: 16px; }
      .panel { padding: 12px; border-radius: 10px; }
      .row { grid-template-columns: 1fr 78px 38px; }
      .option-row { grid-template-columns: minmax(160px, 1fr) repeat(var(--criteria-count), 80px) 78px 38px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Decision Board</h1>
        <div class="sub">把纠结拆成选项、标准和权重。它不会替你思考，但会把偏好摊开，减少拍脑袋。</div>
      </div>
      <div class="actions">
        <button id="sampleBtn" type="button">示例</button>
        <button id="exportBtn" type="button">导出</button>
        <button id="resetBtn" type="button">清空</button>
      </div>
    </header>

    <section class="grid">
      <div class="panel">
        <div class="decision-title">
          <label>
            决策主题
            <input id="decisionName" maxlength="120" placeholder="例如：下一个周末项目做什么？">
          </label>
        </div>

        <div class="section-title">
          <h2>判断标准</h2>
          <button class="primary" id="addCriterion" type="button">添加标准</button>
        </div>
        <div class="rows" id="criteria"></div>

        <div class="section-title" style="margin-top: 18px;">
          <h2>候选选项</h2>
          <button class="primary" id="addOption" type="button">添加选项</button>
        </div>
        <div class="rows" id="options"></div>
      </div>

      <aside>
        <div class="panel">
          <div class="section-title">
            <h2>排序</h2>
            <span class="badge">1-5 分制</span>
          </div>
          <div class="rankings" id="rankings"></div>
          <div class="note">
            <label>
              备注
              <textarea id="notes" placeholder="写下不能被分数表达的前提、风险或直觉"></textarea>
            </label>
          </div>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const storeKey = "decision-board-v1";
    const $ = (id) => document.getElementById(id);
    let state = {
      title: "",
      notes: "",
      criteria: [],
      options: []
    };

    function uid() {
      return crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function load() {
      try {
        state = { ...state, ...JSON.parse(localStorage.getItem(storeKey) || "{}") };
      } catch {
        localStorage.removeItem(storeKey);
      }
      if (!state.criteria.length && !state.options.length) seed();
      $("decisionName").value = state.title;
      $("notes").value = state.notes;
    }

    function save() {
      localStorage.setItem(storeKey, JSON.stringify(state));
    }

    function seed() {
      const impact = uid();
      const ease = uid();
      const joy = uid();
      state.title = "下一个小项目做什么？";
      state.criteria = [
        { id: impact, name: "影响", weight: 5 },
        { id: ease, name: "容易启动", weight: 3 },
        { id: joy, name: "兴奋感", weight: 4 }
      ];
      state.options = [
        { id: uid(), name: "个人工作台", scores: { [impact]: 4, [ease]: 4, [joy]: 3 } },
        { id: uid(), name: "决策板", scores: { [impact]: 3, [ease]: 5, [joy]: 4 } },
        { id: uid(), name: "读书摘录库", scores: { [impact]: 4, [ease]: 3, [joy]: 5 } }
      ];
      state.notes = "分数只是起点。若第一名让你明显抗拒，说明还缺了一个判断标准。";
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, (char) => ({
        "&": "&amp;",
        "<": "&lt;",
        ">": "&gt;",
        '"': "&quot;",
        "'": "&#039;"
      }[char]));
    }

    function scoreOption(option) {
      return state.criteria.reduce((sum, criterion) => {
        const score = Number(option.scores[criterion.id] || 0);
        return sum + score * Number(criterion.weight || 0);
      }, 0);
    }

    function maxScore() {
      return state.criteria.reduce((sum, criterion) => sum + 5 * Number(criterion.weight || 0), 0) || 1;
    }

    function renderCriteria() {
      $("criteria").innerHTML = state.criteria.map((criterion) => `
        <div class="row">
          <label>
            标准
            <input value="${escapeHtml(criterion.name)}" data-criterion-name="${criterion.id}" maxlength="40">
          </label>
          <label>
            权重
            <input type="number" min="1" max="10" value="${criterion.weight}" data-criterion-weight="${criterion.id}">
          </label>
          <button class="icon" title="删除标准" aria-label="删除标准" data-remove-criterion="${criterion.id}">x</button>
        </div>
      `).join("") || `<div class="empty">至少添加一个判断标准。</div>`;
    }

    function renderOptions() {
      document.documentElement.style.setProperty("--criteria-count", Math.max(state.criteria.length, 1));
      $("options").innerHTML = state.options.map((option) => {
        const scoreInputs = state.criteria.map((criterion) => `
          <label class="score-box">
            <span title="${escapeHtml(criterion.name)}">${escapeHtml(criterion.name)}</span>
            <input type="number" min="0" max="5" value="${Number(option.scores[criterion.id] || 0)}" data-option-score="${option.id}" data-criterion="${criterion.id}">
          </label>
        `).join("");
        return `
          <div class="row option-row">
            <label>
              选项
              <input value="${escapeHtml(option.name)}" data-option-name="${option.id}" maxlength="64">
            </label>
            ${scoreInputs || `<div class="mini">先添加标准</div>`}
            <div class="total">${scoreOption(option)}</div>
            <button class="icon" title="删除选项" aria-label="删除选项" data-remove-option="${option.id}">x</button>
          </div>
        `;
      }).join("") || `<div class="empty">添加两个以上选项，排序才会有意思。</div>`;
    }

    function renderRankings() {
      const max = maxScore();
      const ranked = [...state.options].sort((a, b) => scoreOption(b) - scoreOption(a));
      $("rankings").innerHTML = ranked.length ? ranked.map((option, index) => {
        const score = scoreOption(option);
        const width = Math.round(score / max * 100);
        return `
          <div class="rank">
            <div class="rank-head">
              <strong>${index + 1}. ${escapeHtml(option.name || "未命名")}</strong>
              <span class="score">${score}</span>
            </div>
            <div class="meter"><span style="width: ${width}%"></span></div>
          </div>
        `;
      }).join("") : `<div class="empty">还没有候选项。</div>`;
    }

    function renderAll() {
      renderCriteria();
      renderOptions();
      renderRankings();
      save();
    }

    $("decisionName").addEventListener("input", () => {
      state.title = $("decisionName").value;
      save();
    });

    $("notes").addEventListener("input", () => {
      state.notes = $("notes").value;
      save();
    });

    $("addCriterion").addEventListener("click", () => {
      const id = uid();
      state.criteria.push({ id, name: "新标准", weight: 3 });
      state.options.forEach((option) => option.scores[id] = 3);
      renderAll();
    });

    $("addOption").addEventListener("click", () => {
      const scores = {};
      state.criteria.forEach((criterion) => scores[criterion.id] = 3);
      state.options.push({ id: uid(), name: "新选项", scores });
      renderAll();
    });

    $("criteria").addEventListener("change", (event) => {
      const nameId = event.target.dataset.criterionName;
      const weightId = event.target.dataset.criterionWeight;
      if (nameId) state.criteria.find((item) => item.id === nameId).name = event.target.value;
      if (weightId) state.criteria.find((item) => item.id === weightId).weight = Math.max(1, Math.min(10, Number(event.target.value || 1)));
      renderAll();
    });

    $("criteria").addEventListener("click", (event) => {
      const id = event.target.dataset.removeCriterion;
      if (!id) return;
      state.criteria = state.criteria.filter((item) => item.id !== id);
      state.options.forEach((option) => delete option.scores[id]);
      renderAll();
    });

    $("options").addEventListener("change", (event) => {
      const optionName = event.target.dataset.optionName;
      const optionScore = event.target.dataset.optionScore;
      if (optionName) state.options.find((item) => item.id === optionName).name = event.target.value;
      if (optionScore) {
        const option = state.options.find((item) => item.id === optionScore);
        option.scores[event.target.dataset.criterion] = Math.max(0, Math.min(5, Number(event.target.value || 0)));
      }
      renderAll();
    });

    $("options").addEventListener("click", (event) => {
      const id = event.target.dataset.removeOption;
      if (!id) return;
      state.options = state.options.filter((item) => item.id !== id);
      renderAll();
    });

    async function copyText(text) {
      try {
        await navigator.clipboard.writeText(text);
      } catch {
        const scratch = document.createElement("textarea");
        scratch.value = text;
        scratch.style.position = "fixed";
        scratch.style.left = "-9999px";
        document.body.appendChild(scratch);
        scratch.focus();
        scratch.select();
        document.execCommand("copy");
        scratch.remove();
      }
    }

    $("exportBtn").addEventListener("click", async () => {
      const ranked = [...state.options].sort((a, b) => scoreOption(b) - scoreOption(a));
      const lines = [
        `Decision: ${state.title || "Untitled"}`,
        "",
        "Criteria:",
        ...state.criteria.map((item) => `- ${item.name}: weight ${item.weight}`),
        "",
        "Ranking:",
        ...ranked.map((item, index) => `${index + 1}. ${item.name}: ${scoreOption(item)}`),
        "",
        "Notes:",
        state.notes || ""
      ];
      await copyText(lines.join("\n"));
      $("exportBtn").textContent = "已复制";
      setTimeout(() => $("exportBtn").textContent = "导出", 1100);
    });

    $("sampleBtn").addEventListener("click", () => {
      seed();
      $("decisionName").value = state.title;
      $("notes").value = state.notes;
      renderAll();
    });

    $("resetBtn").addEventListener("click", () => {
      state = { title: "", notes: "", criteria: [], options: [] };
      $("decisionName").value = "";
      $("notes").value = "";
      renderAll();
    });

    load();
    renderAll();
  </script>
</body>
</html>
